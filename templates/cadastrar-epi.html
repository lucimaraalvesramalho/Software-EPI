{% extends 'base.html' %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro-epi.css') }}">
{% endblock %}
{% block content %}
<main>
        <h1>Cadastro de EPI</h1>
        <div class="cadastro">
            <form id="epiForm">
                <label for="nome">Nome do EPI:</label>
                <input id="nome" name="nome_epi" type="text" placeholder="Nome do EPI" required>
                <label for="tipo">Tipo do EPI:</label>
                <input id="tipo" name="tipo_epi" type="text" placeholder="Tipo do EPI" required>
                <label for="ca">CA do EPI:</label>
                <input id="ca" name="certificado_aprovacao_epi" type="text" placeholder="CA do EPI" required>
                <label for="validade_ca">Data de Validade do CA:</label>
                <input id="validade_ca" name="validade_certificado_aprovacao" type="date" required>
                <div id="buttons">
                    <button type="submit" id="submit-btn">Cadastrar</button>
                    <button id="theme-btn" type="button"><i id="theme-icon" class="fas fa-moon"></i></button>
                </div>
            </form>
        </div>
    </main>
    <script>
        const button = document.getElementById("theme-btn");
        const icon = document.getElementById("theme-icon");

        const setTheme = (dark) => {
            document.body.classList.toggle("dark-theme", dark);
            icon.classList.toggle("fa-sun", dark);
            icon.classList.toggle("fa-moon", !dark);
            localStorage.setItem("theme", dark ? "dark" : "light");
        };

        setTheme(localStorage.getItem("theme") === "dark");

        button.addEventListener("click", () => {
            setTheme(!document.body.classList.contains("dark-theme"));
        });
    </script>  
{% endblock %}
