<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionário</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Cadastro de Funcionário</h1>
    <form id="funcionarioForm">
        <input id="matricula" name="matricula_funcionario" type="text" placeholder="Matrícula do funcionário" required>
        <input id="nome" name="nome_funcionario" type="text" placeholder="Nome do funcionário" required>
        <input id="cpf" name="cpf_funcionario" type="text" placeholder="CPF do funcionário" required>
        <input id="setor" name="setor_funcionario" type="text" placeholder="Setor do funcionário" required>
        <input id="funcao" name="funcao_funcionario" type="text" placeholder="Função do funcionário" required>
        <input id="data_admissao" name="data_admissao_funcionario" type="date" required>
        <button type="submit">Cadastrar</button>
    </form>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
